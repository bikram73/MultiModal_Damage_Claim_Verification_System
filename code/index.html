<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClaimAI | Multi-Modal Evidence Review</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <style>
    *{font-family:'Inter',sans-serif;box-sizing:border-box;}
    .msymbol{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;direction:ltr;-webkit-font-smoothing:antialiased;font-size:24px;}
    /* Pages */
    .page{display:none;}
    .page.active{display:flex;flex-direction:column;}
    /* Scrollbars */
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:#f1f5f9;}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px;}
    /* Hero */
    .hero-gradient{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 45%,#1e40af 100%);}
    /* Badges */
    .badge-supported{background:#d1fae5;color:#065f46;}
    .badge-contradicted{background:#fee2e2;color:#991b1b;}
    .badge-nei{background:#fef3c7;color:#92400e;}
    .badge-none{background:#f1f5f9;color:#475569;}
    /* Nav */
    .nav-item{transition:all .15s ease;border-right:3px solid transparent;}
    .nav-item.active{background:#eff6ff;color:#1d4ed8;font-weight:600;border-right-color:#2563eb;}
    /* Table rows */
    .claim-row:hover{background:#f8fafc;}
    .claim-row.selected{background:#eff6ff;}
    /* Stat cards */
    .stat-card{transition:transform .15s,box-shadow .15s;}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.07);}
    /* Spinner */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{animation:spin .7s linear infinite;}
    /* Mobile sidebar overlay */
    #sidebarOverlay{display:none;}
    #sidebarOverlay.open{display:block;}
    /* Sidebar off-canvas on mobile */
    @media(max-width:767px){
      #dashSidebar{position:fixed;left:-260px;top:0;height:100%;z-index:40;transition:left .25s ease;}
      #dashSidebar.open{left:0;}
      #dashMain{margin-left:0!important;}
    }
    /* Topbar strategy wrap on small screens */
    @media(max-width:639px){
      #strategyBar{display:none;}
      #strategyBar.mobile-open{display:flex;}
    }
  </style>
</head>

          </div>
          <div class="stat-card bg-white rounded-xl border border-slate-100 p-3 sm:p-5 shadow-sm">

            </div>
